<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>熟語つなぎパズル - 陣取り対戦</title>
    <link rel="stylesheet" href="style.css">
    <script src="dictionary.js"></script>
</head>
<body>

    <div id="game-layout">
        <div id="main-area">
            <div id="game-window">
                <div id="grid-container"></div>
                <div id="launcher" style="display:none;"></div>
                <div id="guide-line" style="display:none;"></div>
                <button id="settings-btn" onclick="toggleSettings()" style="position: absolute; top: 10px; right: 10px; z-index: 100;">⚙️</button>
            </div>

            <!-- Player Hand area -->
            <div id="solo-hand-area">
                <div id="player-hand-container" class="hand-container"></div>
                <button class="shuffle-btn" onclick="shuffleHand()">しゃっふる</button>
            </div>
        </div>

        <!-- Settings Modal -->
        <div id="settings-overlay" onclick="if(event.target === this) toggleSettings()">
            <div id="settings-modal">
                <h2>せってい</h2>
                <div class="setting-item">
                    <span>ブロック追加</span>
                    <select id="speed-select" onchange="updateDifficulty()">
                        <option value="10000">10秒（はやい）</option>
                        <option value="20000" selected>20秒（ゆっくり）</option>
                    </select>
                </div>
                <div class="setting-item">
                    <span>サウンド</span>
                    <button id="sound-toggle-btn" onclick="toggleSound()">ON</button>
                </div>
                <div class="setting-item">
                    <span>フルスクリーン</span>
                    <button onclick="toggleFullscreen()">切替</button>
                </div>
                <button id="close-settings-btn" onclick="toggleSettings()">とじる</button>
            </div>
        </div>

        </div>
    </div>

<script>
const GRID_SIZE = 10;
const TILE_SIZE = 60;

const state = {
    grid: {},
    playerHand: [],
    deck: [],
    selectedHandIndex: 0,
    launcher: { x: -1, y: -1, dir: null, char: '' },
    isShooting: false,
    score: 0,
    spawnSpeed: 20000,
    isSoundOn: true
};

const bgm = new Audio('BGM.mp3');
bgm.loop = true;
let isBgmPlaying = false;
let bgmInteracted = false;

function toggleBGM() {
    if (isBgmPlaying) {
        bgm.pause();
        isBgmPlaying = false;
    } else {
        bgm.play().catch(e => console.log("BGM再生エラー:", e));
        isBgmPlaying = true;
    }
}

let spawnInterval = null;

function startSpawnInterval() {
    if (spawnInterval) clearInterval(spawnInterval);
    spawnInterval = setInterval(() => {
        spawnRandomTile();
        spawnRandomTile();
        spawnObstacle();
    }, state.spawnSpeed);
}

function updateDifficulty() {
    const select = document.getElementById('speed-select');
    state.spawnSpeed = parseInt(select.value);
    startSpawnInterval();
}

function toggleSettings() {
    const overlay = document.getElementById('settings-overlay');
    overlay.style.display = overlay.style.display === 'flex' ? 'none' : 'flex';
}

function toggleSound() {
    state.isSoundOn = !state.isSoundOn;
    document.getElementById('sound-toggle-btn').textContent = state.isSoundOn ? 'ON' : 'OFF';
    if (state.isSoundOn) {
        if (isBgmPlaying) bgm.play();
    } else {
        bgm.pause();
    }
}

function toggleFullscreen() {
    if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen();
    } else {
        if (document.exitFullscreen) {
            document.exitFullscreen();
        }
    }
}

const hubKanji = "用的力学不内生物地人動中定行合通化一自作意大理対外会成出事体電目国日分野気法実名面性入文和度最路感".split("");

let scale = 1.0;
let translateX = 0; 
let translateY = 0;

const gridElement = document.getElementById('grid-container');
const gameWindow = document.getElementById('game-window');
const playerHandElement = document.getElementById('player-hand-container');
const launcherElement = document.getElementById('launcher');
const guideLineElement = document.getElementById('guide-line');
const cellDOMs = {}; 

function init() {
    setupDeck();
    initGridDOM();
    
    // 初期盤面をランダムに配置（中央付近 5x5 〜 7x7 の範囲）
    const initialCount = 12;
    const placed = new Set();
    while (placed.size < initialCount) {
        const rx = 2 + Math.floor(Math.random() * 6);
        const ry = 2 + Math.floor(Math.random() * 6);
        const key = `${rx},${ry}`;
        if (!placed.has(key)) {
            const char = hubKanji[Math.floor(Math.random() * hubKanji.length)];
            placeTile(rx, ry, char, true);
            placed.add(key);
        }
    }

    resetView();
    fillHand();
    renderHand();
    setupEvents();
    refreshHighlights();
    
    startSpawnInterval();
    
    window.addEventListener('click', () => {
        if (!bgmInteracted) {
            bgmInteracted = true;
            bgm.play().then(() => {
                isBgmPlaying = true;
                document.getElementById('bgm-btn').style.opacity = "1";
            }).catch(e => console.log("BGM Blocked", e));
        }
    }, { once: true });
}

function setupDeck() {
    state.deck = [...uniqueKanjiList];
    for (let i = state.deck.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [state.deck[i], state.deck[j]] = [state.deck[j], state.deck[i]];
    }
}

function popNewHandChar() {
    if (state.deck.length === 0) setupDeck();
    
    const usefulIndices = getUsefulKanji();
    // 手札の役立つ漢字の割合を保つための目安
    if (usefulIndices.length > 0 && Math.random() < 0.5) {
        const idx = usefulIndices[Math.floor(Math.random() * usefulIndices.length)];
        return state.deck.splice(idx, 1)[0];
    } else {
        return state.deck.pop();
    }
}

function fillHand() {
    while (state.playerHand.length < 10) {
        state.playerHand.push(popNewHandChar());
    }
}

function getUsefulKanji() {
    const useful = [];
    const directions = [
        { dir: 'down', range: Array.from({length: GRID_SIZE}, (_, i) => [i, 0]) },
        { dir: 'up', range: Array.from({length: GRID_SIZE}, (_, i) => [i, GRID_SIZE - 1]) },
        { dir: 'right', range: Array.from({length: GRID_SIZE}, (_, i) => [0, i]) },
        { dir: 'left', range: Array.from({length: GRID_SIZE}, (_, i) => [GRID_SIZE - 1, i]) }
    ];

    // デッキの一部をスキャンして有効なものを探す
    const scanSize = Math.min(state.deck.length, 50);
    for (let i = state.deck.length - 1; i >= state.deck.length - scanSize; i--) {
        const char = state.deck[i];
        let canForm = false;
        
        for (const {dir, range} of directions) {
            for (const [ex, ey] of range) {
                if (state.grid[`${ex},${ey}`]) continue;
                const landing = getLandingCell(ex, ey, dir);
                if (landing) {
                    state.grid[`${landing.x},${landing.y}`] = char;
                    if (validateLine(landing.x, landing.y, true).isValid || 
                        validateLine(landing.x, landing.y, false).isValid) {
                        canForm = true;
                    }
                    delete state.grid[`${landing.x},${landing.y}`];
                }
                if (canForm) break;
            }
            if (canForm) break;
        }
        if (canForm) useful.push(i);
    }
    return useful;
}

function shuffleHand() {
    state.deck.push(...state.playerHand);
    state.playerHand = [];
    setupDeck();
    fillHand();
    renderHand();
    refreshHighlights();
}

function initGridDOM() {
    gridElement.innerHTML = '';
    for (let y = 0; y < GRID_SIZE; y++) {
        for (let x = 0; x < GRID_SIZE; x++) {
            const cell = document.createElement('div');
            cell.className = 'cell';
            gridElement.appendChild(cell);
            cellDOMs[`${x},${y}`] = cell;
        }
    }
}

function setupEvents() {
    gameWindow.addEventListener('mousemove', handleMouseMove);
    gameWindow.addEventListener('mouseleave', () => {
        launcherElement.style.display = 'none';
        guideLineElement.style.display = 'none';
    });
    gameWindow.addEventListener('click', handleGameClick);
    
    // タッチ操作のサポート
    gameWindow.addEventListener('touchstart', (e) => {
        if (state.isShooting) return;
        const touch = e.touches[0];
        updateLauncherPosition(touch.clientX, touch.clientY);
    }, {passive: true});
    
    gameWindow.addEventListener('touchmove', (e) => {
        if (state.isShooting) return;
        e.preventDefault(); // スクロールを防止してドラッグ操作を優先
        const touch = e.touches[0];
        updateLauncherPosition(touch.clientX, touch.clientY);
    }, {passive: false});
}

function handleMouseMove(e) {
    if (state.isShooting) return;
    updateLauncherPosition(e.clientX, e.clientY);
}

function updateLauncherPosition(clientX, clientY) {
    const rect = gameWindow.getBoundingClientRect();
    const x = clientX - rect.left;
    const y = clientY - rect.top;

    // グリッドの表示位置を取得
    const gx = (rect.width - (GRID_SIZE * TILE_SIZE * scale)) / 2;
    const gy = (rect.height - (GRID_SIZE * TILE_SIZE * scale)) / 2;

    // 外周の判定
    let edgeX = -1, edgeY = -1, dir = null;
    const threshold = 100; // iPad等のタッチ操作を考慮して少し判定範囲を広げる

    if (y < threshold) { edgeY = 0; edgeX = Math.floor((x - gx) / (TILE_SIZE * scale)); dir = 'down'; }
    else if (y > rect.height - threshold) { edgeY = GRID_SIZE - 1; edgeX = Math.floor((x - gx) / (TILE_SIZE * scale)); dir = 'up'; }
    else if (x < threshold) { edgeX = 0; edgeY = Math.floor((y - gy) / (TILE_SIZE * scale)); dir = 'right'; }
    else if (x > rect.width - threshold) { edgeX = GRID_SIZE - 1; edgeY = Math.floor((y - gy) / (TILE_SIZE * scale)); dir = 'left'; }

    if (dir && edgeX >= 0 && edgeX < GRID_SIZE && edgeY >= 0 && edgeY < GRID_SIZE) {
        const char = state.playerHand[state.selectedHandIndex] || '';
        state.launcher = { x: edgeX, y: edgeY, dir, char: char };
        updateLauncherUI(gx, gy);
    } else {
        launcherElement.style.display = 'none';
        guideLineElement.style.display = 'none';
    }
}

function updateLauncherUI(gx, gy) {
    launcherElement.style.display = 'flex';
    launcherElement.textContent = state.launcher.char;
    
    const lX = gx + state.launcher.x * TILE_SIZE * scale;
    const lY = gy + state.launcher.y * TILE_SIZE * scale;
    
    // 発射台の位置を外側にずらす
    let offset = (TILE_SIZE + 10) * scale;
    let finalX = lX, finalY = lY;
    if (state.launcher.dir === 'down') finalY -= offset;
    if (state.launcher.dir === 'up') finalY += offset;
    if (state.launcher.dir === 'right') finalX -= offset;
    if (state.launcher.dir === 'left') finalX += offset;

    launcherElement.style.left = `${finalX}px`;
    launcherElement.style.top = `${finalY}px`;
    launcherElement.style.transform = `scale(${scale})`;

    // ガイド線の表示
    guideLineElement.style.display = 'block';
    guideLineElement.style.left = `${gx + state.launcher.x * TILE_SIZE * scale + (TILE_SIZE*scale/2)}px`;
    guideLineElement.style.top = `${gy + state.launcher.y * TILE_SIZE * scale + (TILE_SIZE*scale/2)}px`;
    
    if (state.launcher.dir === 'down' || state.launcher.dir === 'up') {
        guideLineElement.style.width = '1px';
        guideLineElement.style.height = `${GRID_SIZE * TILE_SIZE * scale}px`;
        if (state.launcher.dir === 'up') guideLineElement.style.top = `${gy + (state.launcher.y - GRID_SIZE + 1) * TILE_SIZE * scale + (TILE_SIZE*scale/2)}px`;
    } else {
        guideLineElement.style.height = '1px';
        guideLineElement.style.width = `${GRID_SIZE * TILE_SIZE * scale}px`;
        if (state.launcher.dir === 'left') guideLineElement.style.left = `${gx + (state.launcher.x - GRID_SIZE + 1) * TILE_SIZE * scale + (TILE_SIZE*scale/2)}px`;
    }
}

async function handleGameClick() {
    if (state.isShooting || launcherElement.style.display === 'none' || state.selectedHandIndex === null) return;
    
    const { x, y, dir, char } = state.launcher;
    const shotIndex = state.selectedHandIndex;
    
    state.isShooting = true;

    // DOM上でアニメーションを開始
    const tileToRemove = playerHandElement.children[shotIndex];
    if (tileToRemove) tileToRemove.classList.add('removing');

    const newChar = popNewHandChar();
    
    // 新しいDOMを末尾に追加（最初は幅0）
    const newTile = document.createElement('div');
    newTile.className = 'hand-tile adding';
    newTile.textContent = newChar;
    newTile.onclick = () => {
        state.selectedHandIndex = state.playerHand.indexOf(newChar); // 簡易対応、再レンダリングで正しくなる
        updateHandSelection();
        refreshHighlights();
    };
    playerHandElement.appendChild(newTile);

    // 強制リフローしてトランジションをトリガー
    void newTile.offsetWidth;
    newTile.classList.remove('adding');

    // 内部ステータスの更新
    state.playerHand.splice(shotIndex, 1);
    state.playerHand.push(newChar);
    
    if (state.playerHand.length > 0) {
        state.selectedHandIndex = Math.min(state.selectedHandIndex, state.playerHand.length - 1);
    } else {
        state.selectedHandIndex = null;
    }

    updateHandSelection();
    refreshHighlights();

    // 0.6秒後に古い要素を消して安全に再描画
    setTimeout(() => {
        if (tileToRemove && tileToRemove.parentNode) tileToRemove.remove();
        renderHand();
    }, 600);

    // 発射アニメーション
    await shoot(x, y, dir, char);
    state.isShooting = false;
}

async function shoot(startX, startY, dir, char) {
    let curX = startX, curY = startY;
    let targetX = startX, targetY = startY;
    
    const dx = { 'right': 1, 'left': -1, 'up': 0, 'down': 0 }[dir];
    const dy = { 'right': 0, 'left': 0, 'up': -1, 'down': 1 }[dir];

    // 最初から埋まっている場合は撃てない
    if (state.grid[`${curX},${curY}`]) {
        return;
    }

    // どこまで進むか計算
    while (true) {
        let nextX = curX + dx, nextY = curY + dy;
        if (nextX < 0 || nextX >= GRID_SIZE || nextY < 0 || nextY >= GRID_SIZE || state.grid[`${nextX},${nextY}`]) {
            targetX = curX;
            targetY = curY;
            break;
        }
        curX = nextX;
        curY = nextY;
    }

    // アニメーション用の一時要素
    const shooter = document.createElement('div');
    shooter.id = 'shooting-tile';
    shooter.textContent = char;
    gameWindow.appendChild(shooter);

    const rect = gameWindow.getBoundingClientRect();
    const gx = (rect.width - (GRID_SIZE * TILE_SIZE * scale)) / 2;
    const gy = (rect.height - (GRID_SIZE * TILE_SIZE * scale)) / 2;

    const startPos = launcherElement.getBoundingClientRect();
    launcherElement.style.display = 'none';
    guideLineElement.style.display = 'none';
    const startXpx = startPos.left - rect.left;
    const startYpx = startPos.top - rect.top;
    const endXpx = gx + targetX * TILE_SIZE * scale;
    const endYpx = gy + targetY * TILE_SIZE * scale;

    shooter.style.left = `${startXpx}px`;
    shooter.style.top = `${startYpx}px`;
    shooter.style.transform = `scale(${scale})`;

    // 距離を計算してスピードを一定にする
    const distance = Math.max(Math.abs(endXpx - startXpx), Math.abs(endYpx - startYpx));
    const speed = 1200; // 1秒間に進むピクセル数（少し速め）
    const duration = Math.max(0.15, distance / speed); // 最短でも0.15秒はかける

    // 移動アニメーション (最初早く、だんだんゆっくりに)
    await new Promise(resolve => {
        setTimeout(() => {
            shooter.style.transition = `all ${duration}s cubic-bezier(0.16, 1, 0.3, 1)`;
            shooter.style.left = `${endXpx}px`;
            shooter.style.top = `${endYpx}px`;
            setTimeout(resolve, duration * 1000);
        }, 10);
    });

    shooter.remove();
    await placeAndCheck(targetX, targetY, char);
}

async function placeAndCheck(x, y, char) {
    state.grid[`${x},${y}`] = char;
    const cell = cellDOMs[`${x},${y}`];
    cell.textContent = char;
    cell.classList.add('occupied');

    const h = validateLine(x, y, true);
    const v = validateLine(x, y, false);
    
    if (h.isValid || v.isValid) {
        const coordsToClear = new Set();
        if (h.isValid) h.coordLists.forEach(list => list.forEach(c => coordsToClear.add(c)));
        if (v.isValid) v.coordLists.forEach(list => list.forEach(c => coordsToClear.add(c)));

        // くっついた瞬間に一回ピカッと光る
        coordsToClear.forEach(c => cellDOMs[c].classList.add('success-flash'));
        await new Promise(r => setTimeout(r, 400));
        coordsToClear.forEach(c => cellDOMs[c].classList.remove('success-flash'));

        // カウントダウン開始
        coordsToClear.forEach(c => cellDOMs[c].classList.add('exploding'));
        
        // 3秒カウントダウン
        for (let i = 3; i > 0; i--) {
            if (i === 2) coordsToClear.forEach(c => cellDOMs[c].classList.add('fast'));
            if (i === 1) coordsToClear.forEach(c => cellDOMs[c].classList.add('faster'));
            await new Promise(r => setTimeout(r, 1000));
        }

        // 爆発
        screenShake();
        
        const finalClearSet = new Set();
        coordsToClear.forEach(c => {
            const [cx, cy] = c.split(',').map(Number);
            // 周囲8マスも含めてクリア対象に追加
            for (let dy = -1; dy <= 1; dy++) {
                for (let dx = -1; dx <= 1; dx++) {
                    const nx = cx + dx, ny = cy + dy;
                    if (nx >= 0 && nx < GRID_SIZE && ny >= 0 && ny < GRID_SIZE) {
                        finalClearSet.add(`${nx},${ny}`);
                    }
                }
            }
            createParticles(cx, cy);
        });

        // 実際の消去
        finalClearSet.forEach(c => {
            delete state.grid[c];
            const dom = cellDOMs[c];
            dom.textContent = '';
            dom.classList.remove('occupied', 'exploding', 'clearing-highlight', 'obstacle');
            state.score++;
        });
        
        refreshHighlights();
    }
}

function spawnObstacle() {
    const emptyCells = [];
    const margin = 3; // 外周3マスは避ける（内側に配置するため）
    for (let y = margin; y < GRID_SIZE - margin; y++) {
        for (let x = margin; x < GRID_SIZE - margin; x++) {
            if (!state.grid[`${x},${y}`]) emptyCells.push({x, y});
        }
    }
    
    // もし中心エリアに空きがなければ全域から探す
    if (emptyCells.length === 0) {
        for (let y = 0; y < GRID_SIZE; y++) {
            for (let x = 0; x < GRID_SIZE; x++) {
                if (!state.grid[`${x},${y}`]) emptyCells.push({x, y});
            }
        }
    }
    
    if (emptyCells.length === 0) return;

    const target = emptyCells[Math.floor(Math.random() * emptyCells.length)];
    state.grid[`${target.x},${target.y}`] = '■'; // お邪魔ブロック
    const cell = cellDOMs[`${target.x},${target.y}`];
    cell.textContent = '■';
    cell.classList.add('occupied', 'obstacle');
    refreshHighlights();
}

function screenShake() {
    gameWindow.classList.remove('shake');
    void gameWindow.offsetWidth; // reflow
    gameWindow.classList.add('shake');
    setTimeout(() => gameWindow.classList.remove('shake'), 500);
}

function createParticles(x, y) {
    const rect = gameWindow.getBoundingClientRect();
    const gx = (rect.width - (GRID_SIZE * TILE_SIZE * scale)) / 2;
    const gy = (rect.height - (GRID_SIZE * TILE_SIZE * scale)) / 2;
    
    const centerX = gx + x * TILE_SIZE + TILE_SIZE / 2;
    const centerY = gy + y * TILE_SIZE + TILE_SIZE / 2;

    for (let i = 0; i < 8; i++) {
        const p = document.createElement('div');
        p.className = 'particle';
        gameWindow.appendChild(p);

        const angle = Math.random() * Math.PI * 2;
        const speed = 2 + Math.random() * 4;
        const vx = Math.cos(angle) * speed;
        const vy = Math.sin(angle) * speed;

        let px = centerX, py = centerY;
        let opacity = 1;

        const animate = () => {
            px += vx;
            py += vy;
            opacity -= 0.02;
            p.style.left = px + 'px';
            p.style.top = py + 'px';
            p.style.opacity = opacity;

            if (opacity > 0) {
                requestAnimationFrame(animate);
            } else {
                p.remove();
            }
        };
        requestAnimationFrame(animate);
    }
}

function spawnRandomTile() {
    const emptyCells = [];
    for (let y = 0; y < GRID_SIZE; y++) {
        for (let x = 0; x < GRID_SIZE; x++) {
            if (!state.grid[`${x},${y}`]) emptyCells.push({x, y});
        }
    }

    if (emptyCells.length === 0) return;

    // 既存の漢字の隣を優先して選ぶ（ゲーム性を保つため）
    const adjacentEmpty = emptyCells.filter(({x, y}) => {
        return [[0,1],[0,-1],[1,0],[-1,0]].some(([dx, dy]) => state.grid[`${x+dx},${y+dy}`]);
    });

    const target = (adjacentEmpty.length > 0 && Math.random() > 0.2) 
        ? adjacentEmpty[Math.floor(Math.random() * adjacentEmpty.length)]
        : emptyCells[Math.floor(Math.random() * emptyCells.length)];

    const char = hubKanji[Math.floor(Math.random() * hubKanji.length)];
    
    state.grid[`${target.x},${target.y}`] = char;
    const cell = cellDOMs[`${target.x},${target.y}`];
    cell.textContent = char;
    cell.classList.add('occupied');
    refreshHighlights();
}

function validateLine(x, y, isH) {
    let minD = 0, maxD = 0, i = 1;
    while (isH ? state.grid[`${x-i},${y}`] : state.grid[`${x},${y-i}`]) { minD = -i; i++; }
    i = 1;
    while (isH ? state.grid[`${x+i},${y}`] : state.grid[`${x},${y+i}`]) { maxD = i; i++; }
    
    let isValid = false, coordLists = [];
    for (let len = 2; len <= 4; len++) {
        for (let offset = -len + 1; offset <= 0; offset++) {
            const s = offset, e = offset + len - 1;
            if (s >= minD && e <= maxD) {
                let word = "", currentCoords = [];
                for (let d = s; d <= e; d++) {
                    const cx = isH ? x+d : x, cy = isH ? y : y+d;
                    word += state.grid[`${cx},${cy}`];
                    currentCoords.push(`${cx},${cy}`);
                }
                if (dictionary.has(word)) { 
                    isValid = true; 
                    coordLists.push(currentCoords);
                }
            }
        }
    }
    return { isValid, coordLists };
}

function updateHandSelection() {
    // removingクラスがついていない有効なタイルのみを対象にする
    const activeTiles = Array.from(playerHandElement.children).filter(t => !t.classList.contains('removing'));
    activeTiles.forEach((tile, index) => {
        if (state.selectedHandIndex === index) {
            tile.classList.add('selected');
        } else {
            tile.classList.remove('selected');
        }
    });
}

function renderHand() {
    playerHandElement.innerHTML = '';
    state.playerHand.forEach((char, index) => {
        const tile = document.createElement('div');
        tile.className = 'hand-tile';
        if (state.selectedHandIndex === index) tile.classList.add('selected');
        tile.textContent = char;
        tile.onclick = () => {
            state.selectedHandIndex = index;
            updateHandSelection();
            refreshHighlights();
        };
        playerHandElement.appendChild(tile);
    });
}

function refreshHighlights() {
    document.querySelectorAll('.hint-highlight').forEach(c => c.classList.remove('hint-highlight'));
    const hand = state.playerHand;
    if (hand.length === 0) return;

    const directions = [
        { dir: 'down', range: Array.from({length: GRID_SIZE}, (_, i) => [i, 0]) },
        { dir: 'up', range: Array.from({length: GRID_SIZE}, (_, i) => [i, GRID_SIZE - 1]) },
        { dir: 'right', range: Array.from({length: GRID_SIZE}, (_, i) => [0, i]) },
        { dir: 'left', range: Array.from({length: GRID_SIZE}, (_, i) => [GRID_SIZE - 1, i]) }
    ];

    const uniqueValidTargets = new Set();

    hand.forEach(char => {
        directions.forEach(({dir, range}) => {
            range.forEach(([ex, ey]) => {
                if (state.grid[`${ex},${ey}`]) return;
                
                const landing = getLandingCell(ex, ey, dir);
                if (landing) {
                    const {x, y} = landing;
                    // すでにこの場所が有効だと分かっているならスキップ（高速化）
                    const key = `${x},${y}`;
                    
                    state.grid[key] = char;
                    const h = validateLine(x, y, true);
                    const v = validateLine(x, y, false);
                    delete state.grid[key];

                    if (h.isValid || v.isValid) {
                        uniqueValidTargets.add(key);
                    }
                }
            });
        });
    });

    uniqueValidTargets.forEach(key => {
        if (cellDOMs[key]) cellDOMs[key].classList.add('hint-highlight');
    });
}

function getLandingCell(startX, startY, dir) {
    let curX = startX, curY = startY;
    const dx = { 'right': 1, 'left': -1, 'up': 0, 'down': 0 }[dir];
    const dy = { 'right': 0, 'left': 0, 'up': -1, 'down': 1 }[dir];

    while (true) {
        let nextX = curX + dx, nextY = curY + dy;
        if (nextX < 0 || nextX >= GRID_SIZE || nextY < 0 || nextY >= GRID_SIZE || state.grid[`${nextX},${nextY}`]) {
            return { x: curX, y: curY };
        }
        curX = nextX;
        curY = nextY;
    }
}

function updateStats() {}

function resetView() {
    const rect = gameWindow.getBoundingClientRect();
    translateX = (rect.width - (GRID_SIZE * TILE_SIZE * scale)) / 2;
    translateY = (rect.height - (GRID_SIZE * TILE_SIZE * scale)) / 2;
    gridElement.style.left = `${translateX}px`;
    gridElement.style.top = `${translateY}px`;
    gridElement.style.transform = `scale(${scale})`;
}

function placeTile(x, y, char, skipCheck = false) {
    state.grid[`${x},${y}`] = char;
    const cell = cellDOMs[`${x},${y}`];
    cell.textContent = char;
    cell.classList.add('occupied');
}

init();
</script>
