<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>熟語花火</title>
    <link rel="stylesheet" href="style.css">
    <!-- 分割したJSファイルを順に読み込む -->
    <script src="dictionary.js"></script>
    <script src="config.js"></script>
    <script src="logic.js"></script>
    <script src="ui.js"></script>
    <script src="main.js"></script>
</head>
<body>
    <div id="app-container">
    
    <!-- Title Screen -->
    <div id="title-screen">
        <h1 class="title-logo">熟語花火</h1>
        <div class="difficulty-selection">
            <button class="diff-btn easy" onclick="startGame('easy')">かんたん</button>
            <button class="diff-btn normal" onclick="startGame('normal')">ふつう</button>
        </div>
    </div>

    <div id="stats-container" style="display:none;">
        <div>ステージ: <span id="stage-val">1</span></div>
        <div id="lamp-container" class="lamp-container"></div>
        <div id="powerup-label" style="color: #d63031; font-weight: 900; font-size: 1.2em; margin-left: 10px;"></div>
        <div>のこり敵: <span id="enemy-val">0</span></div>
    </div>
    
    <div id="game-layout">
    <div id="main-area-container"> <!-- 追加：サイズ管理用の親 -->
        <div id="main-area">
            <div id="game-window">
                <div id="grid-container"></div>
                <div id="launcher" style="display:none;"></div>
                <div id="guide-line" style="display:none;"></div>
                <button id="settings-btn" onclick="toggleSettings()" style="position: absolute; top: 10px; right: 10px; z-index: 100;">⚙️</button>
                <button id="history-btn" onclick="toggleHistory()" style="position: absolute; top: 10px; left: 10px; z-index: 100;">熟</button>
            </div>

            <div id="solo-hand-area">
                <div id="player-hand-container" class="hand-container"></div>
                <button class="shuffle-btn" onclick="shuffleHand()">しゃっふる</button>
            </div>
        </div>
    </div>
</div>

        <!-- Settings Modal -->
        <div id="settings-overlay" onclick="if(event.target === this) toggleSettings()">
            <div id="settings-modal">
                <h2>せってい</h2>
                <div class="setting-item">
                    <span>ブロック追加</span>
                    <select id="speed-select" onchange="updateDifficulty()">
                        <option value="10000">10秒（はやい）</option>
                        <option value="20000" selected>20秒（ゆっくり）</option>
                    </select>
                </div>
                <div class="setting-item">
                    <span>サウンド</span>
                    <button id="sound-toggle-btn" onclick="toggleSound()">ON</button>
                </div>
                <div class="setting-item">
                    <span>フルスクリーン</span>
                    <button onclick="toggleFullscreen()">切替</button>
                </div>
                <hr>
                <button class="menu-btn" onclick="backToTitle()">たいとるに戻る</button>
                <button id="close-settings-btn" onclick="toggleSettings()">とじる</button>
            </div>
        </div>

        <!-- History Modal -->
        <div id="history-overlay" onclick="if(event.target === this) toggleHistory()">
            <div id="history-modal">
                <h2>作った熟語</h2>
                <div id="history-list"></div>
                <button class="menu-btn" onclick="toggleHistory()">とじる</button>
            </div>
        </div>

        <!-- Roulette Overlay -->
        <div id="roulette-overlay" style="display:none;">
            <div id="roulette-container">
                <h2>ぱわーあっぷるーれっと！</h2>
                <div class="slots">
                    <div id="slot-upper" class="slot">
                        <div class="slot-strip" id="strip-upper"></div>
                    </div>
                    <div id="slot-lower" class="slot">
                        <div class="slot-strip" id="strip-lower"></div>
                    </div>
                </div>
                <div class="roulette-guide">画面をクリックして止めて！</div>
            </div>
        </div>

        <!-- Stage Clear Modal -->
        <div id="stage-clear-overlay" style="display:none;">
            <div id="stage-clear-modal">
                <h2 id="clear-title">すてーじ<br>くりあ！</h2>
                <div class="modal-buttons">
                    <button class="clear-btn next" onclick="nextStage()">つぎへ</button>
                    <button class="clear-btn title" onclick="backToTitleFromClear()">たいとるへ</button>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
